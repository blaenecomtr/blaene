<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Yonetim Girisi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }
    .card {
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      padding: 20px;
      max-width: 420px;
      text-align: center;
    }
    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="font-size:18px;margin:0 0 10px 0;">Yonetim kapisi aciliyor...</h1>
    <p style="font-size:13px;line-height:1.5;margin:0 0 12px 0;">
      Yonetim paneline yonlendiriliyorsunuz.
    </p>
    <a href="/admin/" id="admin-link">Yonlendirme olmazsa tiklayin</a>
  </div>

  <script>
    (function () {
      var maxAgeSec = 60 * 60 * 12;
      document.cookie = 'blaene_admin_gate=open; Path=/; Max-Age=' + maxAgeSec + '; SameSite=Lax; Secure';
      try {
        localStorage.setItem('blaene_admin_gate', 'open');
      } catch (_) {}
      setTimeout(function () {
        window.location.href = '/admin/';
      }, 250);
    })();
  </script>
</body>
</html>
