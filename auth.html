<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Hesabı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" />
  <style>
    :root {
      --bg: #ececec;
      --panel: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --border: #d7d7d7;
      --accent: #111827;
      --accent-hover: #1f2937;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --success-border: #9be6bb;
      --error-bg: #fef2f2;
      --error-text: #9f1239;
      --error-border: #f9b7b7;
      --info-bg: #eff6ff;
      --info-text: #1d4ed8;
      --info-border: #bfdbfe;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.2rem 1rem 2rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin-bottom: 0.9rem;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3.7vw, 1.95rem);
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .back-btn {
      border: 1px solid #222;
      background: #efefef;
      color: #111;
      border-radius: 10px;
      padding: 0.56rem 0.95rem;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .alert {
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      font-size: 0.84rem;
      margin-bottom: 0.75rem;
      border: 1px solid transparent;
      line-height: 1.45;
    }

    .alert.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .alert.error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }

    .alert.info {
      background: var(--info-bg);
      border-color: var(--info-border);
      color: var(--info-text);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.95rem;
    }

    .tab-btn {
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      padding: 0.78rem 0.5rem;
      font-family: inherit;
      font-size: 0.93rem;
      font-weight: 700;
      color: #6b7280;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #111827;
      border-bottom-color: #111827;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.34rem;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #cfd5dd;
      border-radius: 10px;
      padding: 0.62rem 0.72rem;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fff;
      color: #111827;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #8ca0b8;
      box-shadow: 0 0 0 3px rgba(140, 160, 184, 0.2);
    }

    .type-options,
    .check-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .type-options label,
    .check-row label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.9rem;
      color: #1f2937;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 600;
      margin: 0;
    }

    .consent-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      padding: 0.72rem;
      display: grid;
      gap: 0.55rem;
    }

    .consent-title {
      font-size: 0.82rem;
      color: #4b5563;
      font-weight: 600;
      margin: 0;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.8rem;
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .btn.primary:hover { background: var(--accent-hover); }

    .btn.secondary {
      background: #fff;
      color: #111827;
      border: 1px solid #d1d5db;
      margin-top: 0.55rem;
    }

    .btn.secondary:hover { background: #f9fafb; }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .forgot-password-link {
      text-align: center;
      margin-top: 0.6rem;
    }

    .forgot-password-link a {
      font-size: 0.85rem;
      color: #6b7280;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-password-link a:hover {
      color: #111827;
      text-decoration: underline;
    }

    .cooldown-warning {
      text-align: center;
      color: #9f1239;
      font-size: 0.85rem;
      margin-top: 0.6rem;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      padding-right: 2.6rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.65rem;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      width: auto;
      margin-top: 0;
    }

    .toggle-password:hover { color: #111827; }

    .contract-toggle {
      background: none;
      border: none;
      padding: 0;
      color: #1a56db;
      text-decoration: underline;
      cursor: pointer;
      font-size: inherit;
      font-family: inherit;
      font-weight: 600;
      text-transform: none;
      letter-spacing: normal;
      width: auto;
      margin-top: 0;
    }

    .contract-toggle:hover { color: #1e40af; }

    .contract-accordion {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      margin-top: 0.45rem;
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .contract-loading {
      margin: 0;
      color: #6b7280;
      font-size: 0.82rem;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Blaene Hesabı</h1>
      <a class="back-btn" href="index.html">Ana sayfaya dön</a>
    </div>

    <div class="panel">
      <div id="alert-box"></div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Giriş Yap</button>
        <button class="tab-btn" data-tab="signup">Hesap Oluştur</button>
      </div>

      <div id="login" class="tab-content active">
        <form id="login-form">
          <div class="form-grid">
            <div class="field full">
              <label for="login-email">E-posta</label>
              <input id="login-email" type="email" required />
            </div>
            <div class="field full">
              <label for="login-password">Şifre</label>
              <input id="login-password" type="password" required />
            </div>
          </div>
          <button type="submit" class="btn primary" id="login-btn">Giriş Yap</button>
        </form>
        <button type="button" class="btn secondary" id="login-google-btn">Google ile bağlan</button>
        <div class="forgot-password-link">
          <a href="forgot-password.html">Şifremi unuttum</a>
        </div>
      </div>

      <div id="signup" class="tab-content">
        <form id="signup-form">
          <div class="form-grid">
            <div class="field full">
              <label for="signup-name">Ad Soyad *</label>
              <input id="signup-name" type="text" required />
            </div>
            <div class="field">
              <label for="signup-email">E-posta *</label>
              <input id="signup-email" type="email" required />
            </div>
            <div class="field">
              <label for="signup-phone">Telefon *</label>
              <input id="signup-phone" type="tel" placeholder="05xx xxx xx xx" required />
            </div>
            <div class="field">
              <label for="signup-city">İl *</label>
              <select id="signup-city" required></select>
            </div>
            <div class="field">
              <label for="signup-district">İlçe *</label>
              <select id="signup-district" required></select>
            </div>
            <div class="field full">
              <label>Müşteri tipi</label>
              <div class="type-options">
                <label><input type="radio" name="signup-customer-type" value="bireysel" checked /> Bireysel</label>
                <label><input type="radio" name="signup-customer-type" value="kurumsal" /> Kurumsal</label>
              </div>
            </div>
            <div class="field full">
              <label for="signup-address">Adres *</label>
              <input id="signup-address" type="text" placeholder="Açık adres" required />
            </div>
            <div class="field full">
              <label for="signup-password">Şifre *</label>
              <div class="password-wrapper">
                <input id="signup-password" type="password" required />
                <button type="button" class="toggle-password" id="toggle-signup-password" aria-label="Şifreyi göster/gizle">
                  <svg id="eye-icon-signup" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg id="eye-off-icon-signup" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <div class="field full">
              <div class="check-row">
                <input id="consent-kvkk" type="checkbox" required />
                <label for="consent-kvkk"><button type="button" class="contract-toggle" data-target="kvkk-text" data-contract-key="kvkk">KVKK aydınlatma metnini</button> okudum ve onaylıyorum.</label>
              </div>
              <div id="kvkk-text" class="contract-accordion" hidden>
                <p class="contract-loading">Yükleniyor...</p>
              </div>
            </div>
            <div class="field full">
              <div class="check-row">
                <input id="consent-terms" type="checkbox" required />
                <label for="consent-terms"><button type="button" class="contract-toggle" data-target="distance-sales-text" data-contract-key="distance_sales">Mesafeli satış ve üyelik sözleşmelerini</button> kabul ediyorum.</label>
              </div>
              <div id="distance-sales-text" class="contract-accordion" hidden>
                <p class="contract-loading">Yükleniyor...</p>
              </div>
            </div>
            <div class="field full">
              <div class="consent-box">
                <p class="consent-title">Reklam / kampanya izinleri (opsiyonel)</p>
                <div class="check-row">
                  <label><input id="consent-email" type="checkbox" /> E-posta ile kampanya almak istiyorum</label>
                </div>
                <div class="check-row">
                  <label><input id="consent-sms" type="checkbox" /> SMS ile kampanya almak istiyorum</label>
                </div>
                <div class="check-row">
                  <label><input id="consent-call" type="checkbox" /> Telefon ile kampanya bilgilendirmesi alabilirim</label>
                </div>
              </div>
            </div>
          </div>
          <button type="submit" class="btn primary" id="signup-btn">Hesap Oluştur</button>
        </form>
        <button type="button" class="btn secondary" id="signup-google-btn">Google ile hızlı kayıt / giriş</button>
      </div>
    </div>
  </div>

      const CUSTOMER_TYPE_STORAGE_PREFIX = 'blaene_customer_type:';
      const LOGIN_COOLDOWN_KEY = 'blaene_login_cooldown';
      const MAX_LOGIN_ATTEMPTS = 5;
      const COOLDOWN_DURATION = 15 * 60 * 1000; // 15 minutes

      const alertBox = document.getElementById('alert-box');
      const tabButtons = document.querySelectorAll('.tab-btn');
      const tabContents = document.querySelectorAll('.tab-content');
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const loginBtn = document.getElementById('login-btn');
      const signupBtn = document.getElementById('signup-btn');
      const loginGoogleBtn = document.getElementById('login-google-btn');
      const signupGoogleBtn = document.getElementById('signup-google-btn');
      const signupCity = document.getElementById('signup-city');
      const signupDistrict = document.getElementById('signup-district');
      const signupCustomerTypeInputs = document.querySelectorAll('input[name="signup-customer-type"]');
      const redirectAfterAuth = (function sanitizeRedirectPath(value) {
        const raw = String(value || '').trim();
        if (!raw) return '/account.html';
        if (!raw.startsWith('/') || raw.startsWith('//')) return '/account.html';
        return raw;
      })(new URLSearchParams(location.search).get('redirect'));

      let loginCooldownInterval = null;

      function showAlert(message, type) {
        alertBox.innerHTML = '<div class="alert ' + type + '">' + message + '</div>';
      }

      function getLoginAttempts() {
        const stored = localStorage.getItem(LOGIN_COOLDOWN_KEY);
        if (!stored) return { attempts: 0, until: 0 };
        try {
          return JSON.parse(stored);
        } catch (_) {
          return { attempts: 0, until: 0 };
        }
      }

      function recordLoginAttempt() {
        const data = getLoginAttempts();
        data.attempts = (data.attempts || 0) + 1;
        if (data.attempts >= MAX_LOGIN_ATTEMPTS) {
          data.until = Date.now() + COOLDOWN_DURATION;
        }
        localStorage.setItem(LOGIN_COOLDOWN_KEY, JSON.stringify(data));
      }

      function isInLoginCooldown() {
        const data = getLoginAttempts();
        if (!data.until || data.until < Date.now()) {
          localStorage.removeItem(LOGIN_COOLDOWN_KEY);
          return false;
        }
        return true;
      }

      function getLoginCooldownTimeLeft() {
        const data = getLoginAttempts();
        if (!data.until) return 0;
        return Math.max(0, data.until - Date.now());
      }

      function clearLoginAttempts() {
        localStorage.removeItem(LOGIN_COOLDOWN_KEY);
      }

      function updateLoginCooldownDisplay() {
        if (!isInLoginCooldown()) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Giriş Yap';
          if (loginCooldownInterval) {
            clearInterval(loginCooldownInterval);
            loginCooldownInterval = null;
          }
          return;
        }

        loginBtn.disabled = true;
        const timeLeft = Math.ceil(getLoginCooldownTimeLeft() / 1000);
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        loginBtn.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;

        if (!loginCooldownInterval) {
          loginCooldownInterval = setInterval(function () {
            const remaining = Math.ceil(getLoginCooldownTimeLeft() / 1000);
            if (remaining <= 0) {
              updateLoginCooldownDisplay();
              return;
            }
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            loginBtn.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
          }, 1000);
        }
      }

      function switchTab(tabName) {
        tabButtons.forEach(function (button) {
          button.classList.toggle('active', button.dataset.tab === tabName);
        });
        tabContents.forEach(function (content) {
          content.classList.toggle('active', content.id === tabName);
        });
      }

      function getDistrictList(city) {
        if (!city) return [];
        if (DISTRICT_MAP[city]) return DISTRICT_MAP[city];
        return ['Merkez'];
      }

      function populateCities() {
        signupCity.innerHTML = '<option value="">İl seçin</option>';
        CITY_LIST.forEach(function (city) {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = city;
          signupCity.appendChild(option);
        });
      }

      function populateDistricts(city) {
        signupDistrict.innerHTML = '';
        if (!city) {
          signupDistrict.innerHTML = '<option value="">Önce il seçin</option>';
          signupDistrict.disabled = true;
          return;
        }
        signupDistrict.disabled = false;
        signupDistrict.innerHTML = '<option value="">İlçe seçin</option>';
        getDistrictList(city).forEach(function (district) {
          const option = document.createElement('option');
          option.value = district;
          option.textContent = district;
          signupDistrict.appendChild(option);
        });
      }

      function getSelectedSignupCustomerType() {
        const selected = Array.from(signupCustomerTypeInputs).find(function (input) { return input.checked; });
        return selected && selected.value === 'kurumsal' ? 'kurumsal' : 'bireysel';
      }

      async function runGoogleAuth(button, fallbackMessage) {
        if (!window.BlaeneAuth || !window.BlaeneAuth.signInWithGoogle) {
          showAlert('Google ile giriş şu an kullanılamıyor.', 'error');
          return;
        }
        const initialText = button.textContent;
        button.disabled = true;
        button.textContent = 'Google yönlendirmesi...';
        try {
          await window.BlaeneAuth.signInWithGoogle(redirectAfterAuth);
        } catch (error) {
          showAlert((error && error.message) || fallbackMessage, 'error');
          button.disabled = false;
          button.textContent = initialText;
        }
      }

      async function waitForAuthReady() {
        for (let i = 0; i < 120; i += 1) {
          if (window.BlaeneAuth && window.supabase) return true;
          await new Promise(function (resolve) { setTimeout(resolve, 50); });
        }
        return false;
      }

      tabButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          switchTab(button.dataset.tab);
        });
      });

      (function () {
        const tab = new URLSearchParams(location.search).get('tab');
        if (tab === 'register' || tab === 'signup') switchTab('signup');
      })();

      signupCity.addEventListener('change', function () {
        populateDistricts(signupCity.value);
      });

      loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        alertBox.innerHTML = '';

        if (isInLoginCooldown()) {
          const timeLeft = Math.ceil(getLoginCooldownTimeLeft() / 1000);
          const minutes = Math.floor(timeLeft / 60);
          const seconds = timeLeft % 60;
          showAlert(
            'Çok fazla başarısız giriş denemesi. Lütfen ' + minutes + ' dakika ' + seconds + ' saniye bekleyin.',
            'error'
          );
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Giriş yapılıyor...';

        try {
          const email = String(document.getElementById('login-email').value || '').trim();
          const password = document.getElementById('login-password').value;
          await window.BlaeneAuth.signIn(email, password);
          clearLoginAttempts();
          showAlert('Başarıyla giriş yapıldı. Yönlendiriliyorsunuz...', 'success');
          setTimeout(function () {
            window.location.href = redirectAfterAuth;
          }, 700);
        } catch (error) {
          recordLoginAttempt();
          updateLoginCooldownDisplay();
          showAlert((error && error.message) || 'Giriş başarısız.', 'error');
          if (!isInLoginCooldown()) {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Giriş Yap';
          }
        }
      });

      signupForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        alertBox.innerHTML = '';
        signupBtn.disabled = true;
        signupBtn.textContent = 'Hesap oluşturuluyor...';

        try {
          const fullName = String(document.getElementById('signup-name').value || '').trim();
          const email = String(document.getElementById('signup-email').value || '').trim();
          const phone = String(document.getElementById('signup-phone').value || '').trim();
          const city = String(signupCity.value || '').trim();
          const district = String(signupDistrict.value || '').trim();
          const address = String(document.getElementById('signup-address').value || '').trim();
          const password = document.getElementById('signup-password').value;
          const customerType = getSelectedSignupCustomerType();
          const consentKvkk = Boolean(document.getElementById('consent-kvkk').checked);
          const consentTerms = Boolean(document.getElementById('consent-terms').checked);
          const consentEmail = Boolean(document.getElementById('consent-email').checked);
          const consentSms = Boolean(document.getElementById('consent-sms').checked);
          const consentCall = Boolean(document.getElementById('consent-call').checked);

          if (!city) throw new Error('Lütfen il seçin.');
          if (!district) throw new Error('Lütfen ilçe seçin.');

          const createdUser = await window.BlaeneAuth.signUp(email, password, fullName, phone, {
            default_address: address,
            default_city: city + ' / ' + district,
            customer_type: customerType,
            consent_kvkk: consentKvkk,
            consent_terms: consentTerms,
            consent_marketing_email: consentEmail,
            consent_marketing_sms: consentSms,
            consent_marketing_call: consentCall
          });

          if (createdUser && createdUser.id) {
            localStorage.setItem(CUSTOMER_TYPE_STORAGE_PREFIX + createdUser.id, customerType);
          }

          showAlert('Hesabınız başarıyla oluşturuldu. Yönlendiriliyorsunuz...', 'success');
          setTimeout(function () {
            window.location.href = redirectAfterAuth;
          }, 1100);
        } catch (error) {
          showAlert((error && error.message) || 'Hesap oluşturulamadı.', 'error');
          signupBtn.disabled = false;
          signupBtn.textContent = 'Hesap Oluştur';
        }
      });

      loginGoogleBtn.addEventListener('click', function () {
        void runGoogleAuth(loginGoogleBtn, 'Google ile giriş başarısız.');
      });

      signupGoogleBtn.addEventListener('click', function () {
        void runGoogleAuth(signupGoogleBtn, 'Google ile kayıt başarısız.');
      });

      (function setupPasswordToggle() {
        var toggleBtn = document.getElementById('toggle-signup-password');
        var pwdInput = document.getElementById('signup-password');
        var eyeOn = document.getElementById('eye-icon-signup');
        var eyeOff = document.getElementById('eye-off-icon-signup');
        if (!toggleBtn || !pwdInput) return;
        toggleBtn.addEventListener('click', function () {
          var isPassword = pwdInput.type === 'password';
          pwdInput.type = isPassword ? 'text' : 'password';
          eyeOn.style.display = isPassword ? 'none' : '';
          eyeOff.style.display = isPassword ? '' : 'none';
        });
      })();

      var contractCache = {};
      function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      async function loadContractData() {
        if (contractCache._loaded) return contractCache;
        try {
          var res = await fetch('/api/public/site-content?key=contracts');
          var json = await res.json();
          contractCache.kvkk = (json && json.data && json.data.contracts && json.data.contracts.kvkk) || '';
          contractCache.distance_sales = (json && json.data && json.data.contracts && json.data.contracts.distance_sales) || '';
        } catch (_) {
          contractCache.kvkk = '';
          contractCache.distance_sales = '';
        }
        contractCache._loaded = true;
        return contractCache;
      }
      document.querySelectorAll('.contract-toggle').forEach(function (btn) {
        btn.addEventListener('click', async function (e) {
          e.preventDefault();
          var targetId = btn.dataset.target;
          var contractKey = btn.dataset.contractKey;
          var panel = document.getElementById(targetId);
          if (!panel) return;
          if (!panel.hidden) { panel.hidden = true; return; }
          panel.hidden = false;
          if (!panel.dataset.loaded) {
            var data = await loadContractData();
            var text = data[contractKey] || '';
            panel.innerHTML = text
              ? '<div class="contract-text">' + escapeHtml(text) + '</div>'
              : '<p class="contract-loading">İçerik bulunamadı.</p>';
            panel.dataset.loaded = '1';
          }
        });
      });

      (async function init() {
        populateCities();
        populateDistricts('');
        updateLoginCooldownDisplay();
        const ready = await waitForAuthReady();
        if (!ready) {
          showAlert('Kimlik servisi yüklenemedi. Sayfayı yenileyin.', 'error');
          return;
        }
        window.BlaeneAuth.initSupabase();
      })();
    })();
  </script>
