<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Admin Sifre Yenile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>Yeni Sifre Belirle</h1>
      <p>E-posta baglantisiyla actiysaniz yeni sifrenizi belirleyin.</p>

      <div id="config-warning" class="alert warning" style="display:none; margin-bottom:0.75rem;"></div>
      <div id="reset-alert" style="margin-bottom:0.75rem;"></div>

      <form id="reset-form">
        <label for="new-password">Yeni sifre</label>
        <input id="new-password" name="newPassword" type="password" minlength="8" autocomplete="new-password" required />

        <label for="confirm-password" style="margin-top:0.6rem;">Yeni sifre (tekrar)</label>
        <input id="confirm-password" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />

        <div class="form-actions">
          <button class="primary" type="submit" id="reset-btn">Sifreyi Guncelle</button>
          <a class="btn" href="./index.html">Giris sayfasina don</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module">
    import { supabase, isSupabaseConfigured } from './supabase-client.js';

    const form = document.getElementById('reset-form');
    const resetBtn = document.getElementById('reset-btn');
    const alertBox = document.getElementById('reset-alert');
    const configWarning = document.getElementById('config-warning');

    let recoveryReady = false;

    function showAlert(message, type = 'error') {
      alertBox.innerHTML = `<div class="alert ${type}">${message}</div>`;
    }

    function setFormDisabled(disabled) {
      form.querySelectorAll('input, button').forEach((el) => {
        el.disabled = disabled;
      });
    }

    async function refreshRecoveryState() {
      if (!supabase) return;
      const { data } = await supabase.auth.getSession();
      recoveryReady = Boolean(data?.session);
      if (!recoveryReady) {
        showAlert('Sifre yenileme baglantisi gecersiz veya suresi dolmus olabilir. E-postadan yeni baglanti isteyin.', 'warning');
      }
    }

    if (!isSupabaseConfigured || !supabase) {
      configWarning.style.display = 'block';
      configWarning.textContent = 'Supabase ayari eksik. admin/supabase-client.js dosyasindaki degerleri kontrol edin.';
      setFormDisabled(true);
    } else {
      supabase.auth.onAuthStateChange((event, session) => {
        if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session) {
          recoveryReady = true;
          alertBox.innerHTML = '';
        }
      });

      await refreshRecoveryState();
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      alertBox.innerHTML = '';

      if (!supabase) {
        showAlert('Supabase baglantisi yok.', 'error');
        return;
      }

      if (!recoveryReady) {
        showAlert('Bu sayfayi e-postadaki sifre yenileme baglantisiyla acin.', 'warning');
        return;
      }

      const password = String(form.newPassword.value || '');
      const confirmPassword = String(form.confirmPassword.value || '');

      if (password.length < 8) {
        showAlert('Sifre en az 8 karakter olmali.', 'warning');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('Sifre tekrar alani eslesmiyor.', 'warning');
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Guncelleniyor...';

      const { error } = await supabase.auth.updateUser({ password });

      resetBtn.disabled = false;
      resetBtn.textContent = 'Sifreyi Guncelle';

      if (error) {
        showAlert(`Sifre guncellenemedi: ${error.message}`, 'error');
        return;
      }

      showAlert('Sifreniz guncellendi. Giris sayfasina yonlendiriliyorsunuz.', 'success');
      setTimeout(() => {
        location.replace('./index.html');
      }, 1400);
    });
  </script>
</body>
</html>
