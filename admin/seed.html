    const seedJson = document.getElementById('seed-json');
    const configWarning = document.getElementById('config-warning');
    const pageAlert = document.getElementById('page-alert');
    const importBtn = document.getElementById('import-btn');
    let authState = null;

    function showAlert(message, type = 'error') {
      pageAlert.innerHTML = `<div class="alert ${type}">${message}</div>`;
      if (type === 'success') {
        setTimeout(() => {
          pageAlert.innerHTML = '';
        }, 3000);
      }
    }

    function normalizeRecord(item, index) {
      if (!item || typeof item !== 'object') {
        throw new Error(`Kayit #${index + 1} nesne degil.`);
      }

      const code = String(item.code || '').trim().toUpperCase();
      const name = String(item.name || '').trim();
      const category = String(item.category || '').trim();

      if (!code || !name || !category) {
        throw new Error(`Kayit #${index + 1} icin code/name/category zorunlu.`);
      }

      return {
        code,
        name,
        category,
        material: item.material ? String(item.material).trim() : null,
        thickness: item.thickness ? String(item.thickness).trim() : null,
        dims: item.dims ? String(item.dims).trim() : null,
        description: item.description ? String(item.description).trim() : null,
        price: item.price === null || item.price === undefined || item.price === '' ? null : Number(item.price),
        price_visible: Boolean(item.price_visible),
        images: Array.isArray(item.images) ? item.images : [],
        variants: Array.isArray(item.variants) ? item.variants : [],
        display_order: Number.isFinite(Number(item.display_order)) ? Number(item.display_order) : 0,
        active: item.active === undefined ? true : Boolean(item.active),
      };
    }

    async function importSeed() {
      if (!authState?.ok) return;

      let parsed = null;
      try {
        parsed = JSON.parse(seedJson.value);
      } catch {
        showAlert('JSON formati gecersiz.', 'error');
        return;
      }

      if (!Array.isArray(parsed) || !parsed.length) {
        showAlert('JSON liste olmali ve en az bir kayit icermeli.', 'error');
        return;
      }

      let records = null;
      try {
        records = parsed.map(normalizeRecord);
      } catch (error) {
        showAlert(error.message, 'error');
        return;
      }

      importBtn.disabled = true;
      importBtn.textContent = 'Aktariliyor...';
      try {
        const { response, data } = await apiFetch('/api/admin/products-bulk', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ records }),
        }, authState);

        if (!response.ok || !data?.success) {
          showAlert(`Seed aktarimi basarisiz: ${data?.error || 'Bilinmeyen hata'}`, 'error');
          showToast(`Seed aktarimi basarisiz: ${data?.error || 'Bilinmeyen hata'}`, 'error');
          return;
        }

        showAlert(`${records.length} kayit aktarıldı/guncellendi.`, 'success');
        showToast(`${records.length} kayit aktarildi/guncellendi.`, 'success');
      } finally {
        importBtn.disabled = false;
        importBtn.textContent = 'Supabase\'e aktar';
      }
    }

    document.getElementById('load-sample-btn').addEventListener('click', () => {
      seedJson.value = JSON.stringify(sampleProducts, null, 2);
    });

    initThemeToggle();
    attachLogoutHandler('#logout-btn');

    if (!isSupabaseConfigured || !supabase) {
      configWarning.style.display = 'block';
      configWarning.textContent = 'Supabase ayari eksik. admin/supabase-client.js dosyasini duzenleyin.';
      importBtn.disabled = true;
      seedJson.value = JSON.stringify(sampleProducts, null, 2);
    } else {
      authState = await checkAuth({
        requiredRoles: ['super_admin', 'admin', 'editor'],
      });
      if (authState.ok) {
        seedJson.value = JSON.stringify(sampleProducts, null, 2);
      }
    }

    importBtn.addEventListener('click', importSeed);
  </script>
</body>
</html>
