<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Admin Siparisler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <h1>BLAENE ADMIN</h1>
      <p>Urun yonetim paneli</p>
      <nav>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./orders.html" class="active">Siparisler</a>
        <a href="./members.html">Üyeler</a>
        <a href="./product.html">Yeni urun</a>
        <a href="./seed.html">Seed aktarimi</a>
        <a href="../index.html" target="_blank" rel="noopener">Siteyi ac</a>
      </nav>
      <button id="logout-btn" class="logout-btn btn">Cikis yap</button>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="top-row">
          <h2>Siparisler</h2>
          <button id="refresh-btn" class="btn small">Yenile</button>
        </div>

        <div id="config-warning" class="alert warning" style="display:none; margin-top:0.7rem;"></div>
        <div id="page-alert" style="margin-top:0.7rem;"></div>

        <div class="filters" style="margin-top:0.7rem;">
          <div>
            <label for="status-filter">Durum</label>
            <select id="status-filter">
              <option value="all">Tum durumlar</option>
              <option value="pending">Beklemede</option>
              <option value="paid">Odendi</option>
              <option value="failed">Basarisiz</option>
            </select>
          </div>
          <div style="min-width:220px; flex:1;">
            <label for="search-input">Ara (siparis no / e-posta)</label>
            <input id="search-input" type="search" />
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="top-row">
          <h2>Durum Ozeti</h2>
          <span id="stats-updated" class="helper">-</span>
        </div>
        <div id="order-stats-grid" class="stats-grid" style="margin-top:0.65rem;"></div>
      </section>

      <section class="panel">
        <p id="summary" class="helper" style="margin:0 0 0.6rem;">Yukleniyor...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Siparis</th>
                <th>Musteri</th>
                <th>Tutar</th>
                <th>Durum</th>
                <th>Kalemler</th>
                <th>Tarih</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { supabase, isSupabaseConfigured, formatPrice } from './supabase-client.js';
    import {
      checkAuth,
      attachLogoutHandler,
      initThemeToggle,
      showToast,
      apiFetch,
    } from './admin-utils.js';

    const configWarning = document.getElementById('config-warning');
    const pageAlert = document.getElementById('page-alert');
    const summary = document.getElementById('summary');
    const orderStatsGrid = document.getElementById('order-stats-grid');
    const statsUpdated = document.getElementById('stats-updated');
    const tbody = document.getElementById('orders-tbody');
    const refreshBtn = document.getElementById('refresh-btn');
    const statusFilter = document.getElementById('status-filter');
    const searchInput = document.getElementById('search-input');

    let authState = null;
    let orders = [];
    let itemsByOrder = new Map();

    function showAlert(message, type = 'error') {
      pageAlert.innerHTML = `<div class="alert ${type}">${message}</div>`;
      if (type === 'success') {
        setTimeout(() => (pageAlert.innerHTML = ''), 2500);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function statusText(status) {
      if (status === 'paid') return 'Odendi';
      if (status === 'failed') return 'Basarisiz';
      return 'Beklemede';
    }

    function statusClass(status) {
      if (status === 'paid') return 'success';
      if (status === 'failed') return 'error';
      return 'warning';
    }

    function filteredOrders() {
      const status = statusFilter.value;
      const search = searchInput.value.trim().toLowerCase();

      return orders.filter((order) => {
        const matchesStatus = status === 'all' || order.payment_status === status;
        const matchesSearch =
          !search ||
          String(order.order_no || '').toLowerCase().includes(search) ||
          String(order.email || '').toLowerCase().includes(search) ||
          String(order.customer_name || '').toLowerCase().includes(search);
        return matchesStatus && matchesSearch;
      });
    }

    function render() {
      const list = filteredOrders();
      summary.textContent = `${list.length} siparis listeleniyor (toplam ${orders.length})`;
      renderStats();

      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="6">Kayit bulunamadi.</td></tr>';
        return;
      }

      tbody.innerHTML = list
        .map((order) => {
          const orderItems = itemsByOrder.get(order.id) || [];
          const itemsHtml = orderItems.length
            ? `<div style="display:grid;gap:0.3rem;">${orderItems
                .map(
                  (item) =>
                    `<div style="font-size:0.74rem;"><strong>${escapeHtml(item.product_code)}</strong> x ${item.quantity} - ${escapeHtml(formatPrice(item.line_total))}</div>`
                )
                .join('')}</div>`
            : '<span class="helper">-</span>';

          const createdAt = order.created_at ? new Date(order.created_at).toLocaleString('tr-TR') : '-';
          const totalText = formatPrice(order.total);

          return `
            <tr>
              <td>
                <span class="code-badge">${escapeHtml(order.order_no)}</span>
                <div class="helper" style="margin-top:0.25rem;">OID: ${escapeHtml(order.merchant_oid || '-')}</div>
              </td>
              <td>
                <div style="font-weight:600;">${escapeHtml(order.customer_name || '-')}</div>
                <div class="helper">${escapeHtml(order.email || '-')}</div>
                <div class="helper">${escapeHtml(order.phone || '-')}</div>
              </td>
              <td>
                <div>${escapeHtml(totalText)}</div>
                <div class="helper">${escapeHtml(order.currency || 'TRY')}</div>
              </td>
              <td>
                <span class="alert ${statusClass(order.payment_status)}" style="display:inline-flex;padding:0.3rem 0.5rem;">${statusText(order.payment_status)}</span>
                <div class="helper" style="margin-top:0.3rem;">PayTR: ${escapeHtml(order.paytr_status || '-')}</div>
                ${order.failed_reason_msg ? `<div class="helper">${escapeHtml(order.failed_reason_msg)}</div>` : ''}
                <div class="inline-actions" style="margin-top:0.45rem;">
                  <button class="btn small" data-set-status="${escapeHtml(order.id)}:pending">Pending</button>
                  <button class="btn small" data-set-status="${escapeHtml(order.id)}:paid">Paid</button>
                  <button class="btn small danger" data-set-status="${escapeHtml(order.id)}:failed">Failed</button>
                </div>
              </td>
              <td>${itemsHtml}</td>
              <td>${escapeHtml(createdAt)}</td>
            </tr>`;
        })
        .join('');
    }

    function renderStats() {
      const total = orders.length;
      const pending = orders.filter((item) => item.payment_status === 'pending').length;
      const paid = orders.filter((item) => item.payment_status === 'paid').length;
      const failed = orders.filter((item) => item.payment_status === 'failed').length;
      const paidRevenue = orders
        .filter((item) => item.payment_status === 'paid')
        .reduce((sum, item) => sum + Number(item.total || 0), 0);
      const avgOrder = total
        ? orders.reduce((sum, item) => sum + Number(item.total || 0), 0) / total
        : 0;

      const cards = [
        { label: 'Toplam siparis', value: String(total) },
        { label: 'Beklemede', value: String(pending) },
        { label: 'Odendi', value: String(paid) },
        { label: 'Basarisiz', value: String(failed) },
        { label: 'Odeme ciro (paid)', value: formatPrice(paidRevenue) },
        { label: 'Ortalama siparis', value: formatPrice(avgOrder) },
      ];

      orderStatsGrid.innerHTML = cards
        .map((card) => `
          <article class="stat-card">
            <span class="label">${escapeHtml(card.label)}</span>
            <strong class="value">${escapeHtml(card.value)}</strong>
          </article>
        `)
        .join('');

      statsUpdated.textContent = `Son guncelleme: ${new Date().toLocaleTimeString('tr-TR')}`;
    }

    async function updateOrderStatus(orderId, nextStatus) {
      if (!authState?.ok) return;

      const { response, data } = await apiFetch('/api/admin/order-status', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          status: nextStatus,
          order_ids: [orderId],
        }),
      }, authState);

      if (!response.ok || !data?.success) {
        showAlert(`Siparis guncellenemedi: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        showToast(`Siparis guncellenemedi: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        return;
      }

      const target = orders.find((order) => order.id === orderId);
      if (target) {
        const payload = data?.data || {};
        target.payment_status = payload.payment_status || nextStatus;
        target.paytr_status = payload.paytr_status || target.paytr_status || null;
        target.paid_at = payload.paid_at || null;
        target.failed_reason_code = payload.failed_reason_code || null;
        target.failed_reason_msg = payload.failed_reason_msg || null;
        target.status = payload.status || target.status || null;
      }

      render();
      showAlert('Siparis durumu guncellendi.', 'success');
      showToast('Siparis durumu guncellendi.', 'success');
    }

    async function loadOrders() {
      if (!authState?.ok) return;

      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Yukleniyor...';

      const { response, data } = await apiFetch('/api/admin/orders?page=1&page_size=200', {
        method: 'GET',
      }, authState);

      if (!response.ok || !data?.success) {
        showAlert(`Siparisler yuklenemedi: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        refreshBtn.disabled = false;
        refreshBtn.textContent = 'Yenile';
        return;
      }

      orders = Array.isArray(data.data) ? data.data : [];
      itemsByOrder = new Map();
      orders.forEach((order) => {
        itemsByOrder.set(order.id, Array.isArray(order.items) ? order.items : []);
      });

      render();
      refreshBtn.disabled = false;
      refreshBtn.textContent = 'Yenile';
    }

    if (!isSupabaseConfigured || !supabase) {
      configWarning.style.display = 'block';
      configWarning.textContent = 'Supabase ayari eksik. admin/supabase-client.js dosyasini duzenleyin.';
      summary.textContent = 'Ayar eksigi.';
      orderStatsGrid.innerHTML = '<article class="stat-card"><span class="label">Durum</span><strong class="value">Ayar eksik</strong></article>';
      tbody.innerHTML = '<tr><td colspan="6">Ayar eksigi.</td></tr>';
    } else {
      authState = await checkAuth({
        requiredRoles: ['super_admin', 'admin', 'editor', 'viewer'],
      });
      if (authState.ok) {
        await loadOrders();
      }
    }

    initThemeToggle();
    attachLogoutHandler('#logout-btn');

    refreshBtn.addEventListener('click', loadOrders);
    statusFilter.addEventListener('change', render);
    searchInput.addEventListener('input', render);

    tbody.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-set-status]');
      if (!button) return;
      const raw = String(button.dataset.setStatus || '');
      const [orderId, nextStatus] = raw.split(':');
      if (!orderId || !nextStatus) return;
      await updateOrderStatus(orderId, nextStatus);
    });
  </script>
</body>
</html>
