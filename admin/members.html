<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Admin Üyeler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <h1>BLAENE ADMIN</h1>
      <p>Urun yonetim paneli</p>
      <nav>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./orders.html">Siparisler</a>
        <a href="./members.html" class="active">Üyeler</a>
        <a href="./product.html">Yeni urun</a>
        <a href="./seed.html">Seed aktarimi</a>
        <a href="../index.html" target="_blank" rel="noopener">Siteyi ac</a>
      </nav>
      <button id="logout-btn" class="logout-btn btn">Cikis yap</button>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="top-row">
          <h2>Müşteri Üyeleri</h2>
          <button id="refresh-btn" class="btn small">Yenile</button>
        </div>

        <div id="config-warning" class="alert warning" style="display:none; margin-top:0.7rem;"></div>
        <div id="page-alert" style="margin-top:0.7rem;"></div>

        <div class="filters" style="margin-top:0.7rem;">
          <div style="min-width:220px; flex:1;">
            <label for="search-input">Ara (ad / email)</label>
            <input id="search-input" type="search" />
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="top-row">
          <h2>Üye Özeti</h2>
          <span id="stats-updated" class="helper">-</span>
        </div>
        <div id="member-stats-grid" class="stats-grid" style="margin-top:0.65rem;"></div>
      </section>

      <section class="panel">
        <p id="summary" class="helper" style="margin:0 0 0.6rem;">Yükleniyor...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ad Soyad</th>
                <th>Email</th>
                <th>Telefon</th>
                <th>Kayıt Tarihi</th>
                <th>Sipariş Sayısı</th>
              </tr>
            </thead>
            <tbody id="members-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { supabase, isSupabaseConfigured, formatPrice } from './supabase-client.js';
    import {
      checkAuth,
      attachLogoutHandler,
      initThemeToggle,
      showToast,
      apiFetch,
    } from './admin-utils.js';

    const configWarning = document.getElementById('config-warning');
    const pageAlert = document.getElementById('page-alert');
    const summary = document.getElementById('summary');
    const memberStatsGrid = document.getElementById('member-stats-grid');
    const statsUpdated = document.getElementById('stats-updated');
    const tbody = document.getElementById('members-tbody');
    const refreshBtn = document.getElementById('refresh-btn');
    const searchInput = document.getElementById('search-input');

    if (!isSupabaseConfigured()) {
      configWarning.innerHTML = 'Supabase yapılandırılmamış.';
      configWarning.style.display = '';
    }

    (async function init() {
      await checkAuth();
      initThemeToggle();
      attachLogoutHandler();

      async function loadMembers() {
        summary.textContent = 'Yükleniyor...';
        tbody.innerHTML = '';

        try {
          // Fetch customer profiles
          const { data: members, error } = await supabase
            .from('customer_profiles')
            .select('id, email, full_name, phone, created_at')
            .order('created_at', { ascending: false });

          if (error) throw error;

          if (!members || members.length === 0) {
            summary.textContent = 'Üye bulunamadı.';
            memberStatsGrid.innerHTML = `
              <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Toplam Üye</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Bu Ay Kaydolanlar</div>
              </div>
            `;
            statsUpdated.textContent = new Date().toLocaleTimeString('tr-TR');
            return;
          }

          // Count orders per member
          const memberOrderCounts = {};
          for (const member of members) {
            const { count } = await supabase
              .from('orders')
              .select('*', { count: 'exact', head: true })
              .eq('user_id', member.id);
            memberOrderCounts[member.id] = count || 0;
          }

          // Filter by search
          const searchQuery = (searchInput.value || '').toLowerCase();
          const filtered = members.filter((m) => {
            const name = (m.full_name || '').toLowerCase();
            const email = (m.email || '').toLowerCase();
            return name.includes(searchQuery) || email.includes(searchQuery);
          });

          summary.textContent = filtered.length + ' üyesi listeleniyor';

          // Stats
          const thisMonth = members.filter((m) => {
            const created = new Date(m.created_at);
            const now = new Date();
            return (
              created.getFullYear() === now.getFullYear() &&
              created.getMonth() === now.getMonth()
            );
          }).length;

          memberStatsGrid.innerHTML = `
            <div class="stat-card">
              <div class="stat-value">${members.length}</div>
              <div class="stat-label">Toplam Üye</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${thisMonth}</div>
              <div class="stat-label">Bu Ay Kaydolanlar</div>
            </div>
          `;

          // Render table
          tbody.innerHTML = filtered
            .map((member) => {
              const createdDate = new Date(member.created_at).toLocaleDateString('tr-TR');
              const orderCount = memberOrderCounts[member.id] || 0;
              return `
                <tr>
                  <td><strong>${member.full_name || '—'}</strong></td>
                  <td>${member.email}</td>
                  <td>${member.phone || '—'}</td>
                  <td>${createdDate}</td>
                  <td>${orderCount}</td>
                </tr>
              `;
            })
            .join('');

          statsUpdated.textContent = new Date().toLocaleTimeString('tr-TR');
        } catch (error) {
          showToast('Üyeler yüklenemedi: ' + (error.message || error), 'error');
          summary.textContent = 'Hata oluştu.';
        }
      }

      refreshBtn.addEventListener('click', loadMembers);
      searchInput.addEventListener('input', loadMembers);

      await loadMembers();
    })();
  </script>
</body>
</html>
