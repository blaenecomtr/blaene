<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blaene Admin Urun Formu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <h1>BLAENE ADMIN</h1>
      <p>Urun yonetim paneli</p>
      <nav>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./orders.html">Siparisler</a>
        <a href="./members.html">Üyeler</a>
        <a href="./product.html" class="active">Urun formu</a>
        <a href="./seed.html">Seed aktarimi</a>
        <a href="../index.html" target="_blank" rel="noopener">Siteyi ac</a>
      </nav>
      <button id="logout-btn" class="logout-btn btn">Cikis yap</button>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="top-row">
          <h2 id="page-title">Yeni urun</h2>
          <a class="btn" href="./dashboard.html">Listeye don</a>
        </div>

        <div id="config-warning" class="alert warning" style="display:none; margin-top:0.7rem;"></div>
        <div id="page-alert" style="margin-top:0.7rem;"></div>

        <form id="product-form" style="margin-top:0.7rem;">
          <div class="grid-3">
            <div>
              <label for="code">Kod *</label>
              <input id="code" name="code" maxlength="40" required />
            </div>
            <div>
              <label for="category">Kategori *</label>
              <select id="category" name="category" required>
                <option value="bath">Banyo</option>
                <option value="forge">Ates cukuru</option>
                <option value="industrial">Moduler raf</option>
              </select>
            </div>
            <div>
              <label for="display-order">Sira</label>
              <input id="display-order" name="displayOrder" type="number" step="1" value="0" />
            </div>
          </div>

          <div class="grid-2" style="margin-top:0.7rem;">
            <div>
              <label for="name">Urun adi *</label>
              <input id="name" name="name" maxlength="180" required />
            </div>
            <div>
              <label for="material">Malzeme</label>
              <input id="material" name="material" maxlength="180" />
            </div>
          </div>

          <div class="grid-3" style="margin-top:0.7rem;">
            <div>
              <label for="thickness">Kalinlik</label>
              <input id="thickness" name="thickness" maxlength="120" />
            </div>
            <div>
              <label for="dims">Olcu</label>
              <input id="dims" name="dims" maxlength="180" />
            </div>
            <div>
              <label for="price">Fiyat (TRY)</label>
              <input id="price" name="price" type="number" step="0.01" min="0" />
            </div>
          </div>

          <div style="margin-top:0.7rem;">
            <label for="description">Aciklama</label>
            <textarea id="description" name="description" placeholder="Urun aciklamasi"></textarea>
          </div>

          <div class="grid-3" style="margin-top:0.7rem;">
            <label class="toggle">
              <input id="price-visible" name="priceVisible" type="checkbox" />
              <span>Fiyat sitede gorunsun</span>
            </label>
            <label class="toggle">
              <input id="active" name="active" type="checkbox" checked />
              <span>Urun yayinda</span>
            </label>
          </div>

          <div class="panel" style="margin-top:0.8rem; padding:0.8rem;">
            <h2 style="font-size:0.95rem; margin-bottom:0.45rem;">Gorseller</h2>
            <p class="helper" style="margin-top:0;">Yuklenen dosyalar `product-images` bucket'ina kaydedilir.</p>
            <input id="image-upload" type="file" accept="image/*" multiple />
            <div class="form-actions" style="margin-top:0.5rem;">
              <button id="upload-btn" type="button" class="btn">Dosyalari yukle</button>
              <span id="upload-status" class="helper"></span>
            </div>
            <div id="images-list" class="thumb-list" style="margin-top:0.6rem;"></div>
          </div>

          <div style="margin-top:0.8rem;">
            <label for="variants">Varyantlar (JSON)</label>
            <textarea id="variants" name="variants" placeholder='[{"label":"Siyah","images":["https://..."]}]'></textarea>
            <p class="helper">Opsiyonel. Industrial urunlerde renk bazli galeriler icin kullanilir.</p>
          </div>

          <div class="form-actions">
            <button id="save-btn" class="primary" type="submit">Kaydet</button>
            <button id="delete-btn" class="danger" type="button" style="display:none;">Urunu sil</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module">
    import {
      supabase,
      isSupabaseConfigured,
      mapDbProductToUi,
      mapUiProductToDb,
      parseJsonArray,
      inferCategoryFromCode,
    } from './supabase-client.js';
    import {
      checkAuth,
      attachLogoutHandler,
      initThemeToggle,
      showToast,
      apiFetch,
    } from './admin-utils.js';

    const params = new URLSearchParams(location.search);
    const productId = params.get('id');

    const pageTitle = document.getElementById('page-title');
    const pageAlert = document.getElementById('page-alert');
    const configWarning = document.getElementById('config-warning');
    const form = document.getElementById('product-form');
    const saveBtn = document.getElementById('save-btn');
    const deleteBtn = document.getElementById('delete-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const uploadInput = document.getElementById('image-upload');
    const uploadStatus = document.getElementById('upload-status');
    const imagesList = document.getElementById('images-list');

    let authState = null;
    let editingProduct = null;
    let imageUrls = [];

    function showAlert(message, type = 'error') {
      pageAlert.innerHTML = `<div class="alert ${type}">${message}</div>`;
      if (type === 'success') {
        setTimeout(() => {
          pageAlert.innerHTML = '';
        }, 3500);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderImages() {
      if (!imageUrls.length) {
        imagesList.innerHTML = '<span class="helper">Henuz gorsel eklenmedi.</span>';
        return;
      }

      imagesList.innerHTML = imageUrls
        .map((url, index) => `
          <div style="position:relative;">
            <img class="thumb" src="${escapeHtml(url)}" alt="Gorsel ${index + 1}" />
            <button type="button" class="btn small danger" data-remove-image="${index}" style="position:absolute; top:3px; right:3px;">x</button>
          </div>`)
        .join('');
    }

    function getFormProduct() {
      const code = String(form.code.value || '').trim().toUpperCase();
      const name = String(form.name.value || '').trim();
      const category = String(form.category.value || '').trim() || inferCategoryFromCode(code);
      const material = String(form.material.value || '').trim();
      const thickness = String(form.thickness.value || '').trim();
      const dims = String(form.dims.value || '').trim();
      const description = String(form.description.value || '').trim();
      const price = form.price.value === '' ? null : Number(form.price.value);
      const priceVisible = form.priceVisible.checked;
      const active = form.active.checked;
      const displayOrder = form.displayOrder.value === '' ? 0 : Number(form.displayOrder.value);
      const variants = parseJsonArray(form.variants.value, []);

      return {
        code,
        name,
        category,
        material,
        thickness,
        dims,
        description,
        price,
        priceVisible,
        images: [...imageUrls],
        variants,
        displayOrder,
        active,
      };
    }

    function fillForm(product) {
      form.code.value = product.code;
      form.name.value = product.name;
      form.category.value = product.category;
      form.material.value = product.material;
      form.thickness.value = product.thickness;
      form.dims.value = product.dims;
      form.description.value = product.description;
      form.price.value = product.price ?? '';
      form.priceVisible.checked = Boolean(product.priceVisible);
      form.active.checked = Boolean(product.active);
      form.displayOrder.value = product.displayOrder ?? 0;
      form.variants.value = product.variants?.length ? JSON.stringify(product.variants, null, 2) : '';
      imageUrls = Array.isArray(product.images) ? [...product.images] : [];
      renderImages();
    }

    async function loadProduct() {
      if (!authState?.ok || !productId) return;

      const { response, data } = await apiFetch('/api/admin/products?page=1&page_size=1000', {
        method: 'GET',
      }, authState);

      if (!response.ok || !data?.success) {
        showAlert(`Urun yuklenemedi: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        return;
      }

      const row = Array.isArray(data.data)
        ? data.data.find((item) => item.id === productId)
        : null;
      if (!row) {
        showAlert('Urun bulunamadi.', 'error');
        return;
      }

      editingProduct = mapDbProductToUi(row);
      fillForm(editingProduct);
      pageTitle.textContent = `${editingProduct.code} duzenle`;
      deleteBtn.style.display = 'inline-flex';
    }

    async function uploadImages() {
      if (!supabase) return;

      const files = Array.from(uploadInput.files || []);
      if (!files.length) {
        uploadStatus.textContent = 'Dosya secilmedi.';
        return;
      }

      uploadBtn.disabled = true;
      uploadStatus.textContent = 'Yukleniyor...';

      for (const file of files) {
        const extension = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'jpg';
        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '-').toLowerCase();
        const path = `products/${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${safeName}`;

        const { error: uploadError } = await supabase.storage
          .from('product-images')
          .upload(path, file, {
            cacheControl: '3600',
            upsert: false,
          });

        if (uploadError) {
          showAlert(`Gorsel yuklenemedi (${file.name}): ${uploadError.message}`, 'error');
          showToast(`Gorsel yuklenemedi: ${file.name}`, 'error');
          continue;
        }

        const { data: publicUrlData } = supabase.storage
          .from('product-images')
          .getPublicUrl(path);

        if (publicUrlData?.publicUrl) {
          imageUrls.push(publicUrlData.publicUrl);
        }
      }

      uploadBtn.disabled = false;
      uploadInput.value = '';
      uploadStatus.textContent = 'Yukleme tamamlandi.';
      renderImages();
      showToast('Gorsel yukleme tamamlandi.', 'success');
    }

    async function saveProduct(event) {
      event.preventDefault();
      if (!supabase) return;
      pageAlert.innerHTML = '';

      const product = getFormProduct();
      if (!product.code || !product.name || !product.category) {
        showAlert('Kod, urun adi ve kategori zorunludur.', 'error');
        return;
      }

      if (!Array.isArray(product.variants)) {
        showAlert('Varyant JSON formati gecersiz.', 'error');
        return;
      }

      const payload = mapUiProductToDb(product);

      saveBtn.disabled = true;
      saveBtn.textContent = 'Kaydediliyor...';

      let error = null;
      if (editingProduct?.id) {
        const response = await apiFetch('/api/admin/products', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            id: editingProduct.id,
            ...payload,
          }),
        }, authState);
        error = !response.response.ok || !response.data?.success
          ? { message: response.data?.error || 'Bilinmeyen hata' }
          : null;
      } else {
        const response = await apiFetch('/api/admin/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        }, authState);
        error = !response.response.ok || !response.data?.success
          ? { message: response.data?.error || 'Bilinmeyen hata' }
          : null;
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'Kaydet';

      if (error) {
        showAlert(`Kaydetme basarisiz: ${error.message}`, 'error');
        showToast(`Kaydetme basarisiz: ${error.message}`, 'error');
        return;
      }

      showAlert('Urun kaydedildi.', 'success');
      showToast('Urun kaydedildi.', 'success');
      setTimeout(() => {
        location.href = './dashboard.html';
      }, 800);
    }

    async function deleteCurrentProduct() {
      if (!authState?.ok || !editingProduct?.id) return;
      if (!confirm('Bu urunu silmek istediginize emin misiniz?')) return;

      const { response, data } = await apiFetch(`/api/admin/products?id=${encodeURIComponent(editingProduct.id)}`, {
        method: 'DELETE',
      }, authState);

      if (!response.ok || !data?.success) {
        showAlert(`Silme basarisiz: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        showToast(`Silme basarisiz: ${data?.error || 'Bilinmeyen hata'}`, 'error');
        return;
      }

      showAlert('Urun silindi.', 'success');
      showToast('Urun silindi.', 'success');
      setTimeout(() => {
        location.href = './dashboard.html';
      }, 700);
    }

    if (!isSupabaseConfigured || !supabase) {
      configWarning.style.display = 'block';
      configWarning.textContent = 'Supabase ayari eksik. admin/supabase-client.js dosyasini duzenleyin.';
      form.querySelectorAll('input, select, textarea, button').forEach((element) => {
        element.disabled = true;
      });
    } else {
      authState = await checkAuth({
        requiredRoles: ['super_admin', 'admin', 'editor'],
      });
      if (authState.ok) {
        if (productId) {
          await loadProduct();
        } else {
          renderImages();
        }
      }
    }

    initThemeToggle();
    attachLogoutHandler('#logout-btn');

    form.code.addEventListener('blur', () => {
      const code = String(form.code.value || '').trim().toUpperCase();
      if (!code) return;
      form.code.value = code;
      if (!editingProduct) {
        form.category.value = inferCategoryFromCode(code);
      }
    });

    uploadBtn.addEventListener('click', uploadImages);
    form.addEventListener('submit', saveProduct);
    deleteBtn.addEventListener('click', deleteCurrentProduct);

    imagesList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-remove-image]');
      if (!button) return;
      const index = Number(button.dataset.removeImage);
      if (!Number.isInteger(index)) return;
      imageUrls.splice(index, 1);
      renderImages();
    });
  </script>
</body>
</html>
