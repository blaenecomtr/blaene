<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaene — Ürün Detayı</title>
    <meta name="description" content="Blaene Bath koleksiyonu ürün detayı. 304 Paslanmaz Çelik, DFMA uyumlu metal tasarım.">
    <link rel="icon" href="logo/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="logo/sitelogo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo/sitelogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Bebas+Neue&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Bebas+Neue&display=swap"></noscript>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --background:       #f7f7f7;
            --foreground:       #111111;
            --card:             #ffffff;
            --border:           #e2e2e2;
            --muted:            #efefef;
            --muted-foreground: #666666;
            --accent:           #E07020;
            --accent-dark:      #C05810;
            --text-2:           var(--muted-foreground);
            --text-3:           #aaaaaa;
            --white:            #ffffff;
        }

        ::selection { background: var(--accent); color: #000; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ── HEADER ─────────────────────────────────────── */
        .site-header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; height: 60px;
            background-color: rgba(247,247,247,0.97);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .header-logo { height: 16px; filter: none; opacity: 0.88; display: block; }
        .header-center { display: flex; align-items: center; gap: 2rem; }
        @media (max-width: 860px) { .header-center { display: none; } }
        .nav-link {
            font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em;
            text-transform: uppercase; text-decoration: none;
            color: var(--text-2); transition: color 0.15s;
        }
        .nav-link:hover { color: var(--foreground); }
        .nav-link.active { color: var(--foreground); }
        .header-right { display: flex; align-items: center; gap: 1.2rem; }
        .wa-header-btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.42rem 0.9rem;
            background-color: var(--accent); color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            text-decoration: none;
            transition: background-color 0.15s;
        }
        .wa-header-btn:hover { background-color: var(--accent-dark); }

        /* ── BREADCRUMB ──────────────────────────────────── */
        .breadcrumb-bar {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--card);
        }
        .breadcrumb {
            font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-3); display: flex; align-items: center; gap: 0.4rem;
            max-width: 1200px; margin: 0 auto;
        }
        .breadcrumb a { color: var(--text-3); text-decoration: none; transition: color 0.15s; }
        .breadcrumb a:hover { color: var(--text-2); }
        .breadcrumb-sep { color: var(--text-3); }
        .breadcrumb-current { color: var(--foreground); }

        /* ── PRODUCT LAYOUT ──────────────────────────────── */
        .product-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100dvh - 120px);
        }
        @media (max-width: 860px) {
            .product-layout { grid-template-columns: 1fr; }
        }

        /* ── IMAGE COLUMN ────────────────────────────────── */
        .img-col {
            position: sticky; top: 60px;
            height: calc(100dvh - 60px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            background-color: #ffffff;
            overflow: hidden;
        }
        @media (max-width: 860px) {
            .img-col {
                position: relative; top: 0;
                height: auto; border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
        .gallery-main {
            flex: 1; min-height: 0;
            display: flex; align-items: center; justify-content: center;
            background-color: #ffffff;
            position: relative; overflow: hidden;
        }
        @media (max-width: 860px) { .gallery-main { height: 60vw; min-height: 280px; flex: none; } }
        .gallery-main-img {
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 2rem;
            display: block;
            transition: filter 0.35s, opacity 0.25s;
        }
        .gallery-main-img.siyah { filter: brightness(0.2) contrast(1.1) saturate(0); }
        .gallery-thumbs {
            display: flex; gap: 1px;
            background-color: var(--border);
            flex-shrink: 0;
        }
        .gallery-thumb {
            flex: 1; aspect-ratio: 1; overflow: hidden;
            cursor: pointer; opacity: 0.4;
            background-color: #ffffff;
            transition: opacity 0.15s;
            max-width: 80px;
        }
        .gallery-thumb:hover, .gallery-thumb.active { opacity: 1; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 0.25rem; }

        /* ── GALLERY NAV ARROWS ──────────────────────────── */
        .gallery-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; z-index: 10;
            background: rgba(255,255,255,0.88); border: 1px solid rgba(0,0,0,0.12);
            color: rgba(0,0,0,0.6); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
            opacity: 0.7;
        }
        .gallery-arrow:hover { background: var(--accent); border-color: var(--accent); color: #fff; opacity: 1; }
        .gallery-arrow:disabled { opacity: 0.15; cursor: default; pointer-events: none; }
        .gallery-arrow-prev { left: 0.75rem; }
        .gallery-arrow-next { right: 0.75rem; }
        @media (max-width: 480px) {
            .gallery-arrow { width: 36px; height: 36px; }
            .gallery-arrow-prev { left: 0.4rem; }
            .gallery-arrow-next { right: 0.4rem; }
        }

        /* ── ZOOM BUTTON ─────────────────────────────────── */
        .gallery-main { cursor: zoom-in; }
        .zoom-btn {
            position: absolute; bottom: 0.9rem; right: 0.9rem;
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.14);
            color: rgba(0,0,0,0.65); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.15s, background-color 0.15s, border-color 0.15s;
            z-index: 10;
        }
        .gallery-main:hover .zoom-btn { opacity: 1; }
        .zoom-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── LIGHTBOX ────────────────────────────────────── */
        .lightbox {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(255,255,255,0.98);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }
        #lightbox-img {
            max-width: min(92vw, 1200px); max-height: 88vh;
            object-fit: contain; display: block;
            user-select: none; pointer-events: none;
        }
        .lightbox-close {
            position: absolute; top: 1.25rem; right: 1.25rem;
            width: 44px; height: 44px;
            background: transparent; border: 1px solid rgba(0,0,0,0.18);
            color: rgba(0,0,0,0.6); cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s, color 0.15s;
        }
        .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px;
            background: transparent; border: 1px solid rgba(0,0,0,0.14);
            color: rgba(0,0,0,0.55); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s, color 0.15s;
        }
        .lightbox-nav:hover { border-color: var(--accent); color: var(--accent); }
        .lightbox-nav:disabled { opacity: 0.15; cursor: default; pointer-events: none; }
        #lightbox-prev { left: 1.5rem; }
        #lightbox-next { right: 1.5rem; }
        .lightbox-counter {
            position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
            color: rgba(0,0,0,0.4);
        }

        /* ── INFO COLUMN ─────────────────────────────────── */
        .info-col {
            display: flex; flex-direction: column;
            padding: 2.5rem 2rem;
            overflow-y: auto;
            gap: 0;
        }
        @media (max-width: 860px) { .info-col { padding: 1.75rem 1.5rem; } }

        .info-eyebrow {
            font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--text-3); margin-bottom: 0.6rem;
        }
        .info-code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.8rem, 4vw, 3.4rem);
            letter-spacing: 0.02em; line-height: 1;
            color: var(--accent); margin-bottom: 0.35rem;
        }
        .info-name {
            font-size: 1rem; font-weight: 500;
            color: var(--foreground); margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .info-divider { height: 1px; background-color: var(--border); margin-bottom: 1.5rem; }

        /* ── VARIANT SELECTOR ────────────────────────────── */
        .sub-label {
            font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--text-3); margin-bottom: 0.6rem;
        }
        .variant-btns { display: flex; gap: 6px; margin-bottom: 1.5rem; }
        .variant-btn {
            padding: 0.38rem 1rem;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-2); font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background-color 0.15s;
        }
        .variant-btn.active {
            border-color: var(--accent); color: var(--accent);
            background-color: rgba(224,112,32,0.06);
        }
        .variant-btn:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }

        /* ── SPECS TABLE ─────────────────────────────────── */
        .specs-table {
            width: 100%; border-collapse: collapse;
            border-top: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .specs-table tr { border-bottom: 1px solid var(--border); }
        .specs-table td { padding: 0.75rem 0; font-size: 0.82rem; }
        .specs-table td:first-child {
            color: var(--text-3); font-size: 0.64rem;
            letter-spacing: 0.12em; text-transform: uppercase; width: 38%;
        }
        .specs-table td:last-child { color: var(--foreground); font-weight: 500; }

        /* ── TECHNICAL FILES ─────────────────────────────── */
        .tech-section { margin-bottom: 1.5rem; }
        .tech-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .tech-btn {
            display: inline-flex; align-items: center; gap: 0.42rem;
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border); color: var(--text-2);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.66rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .tech-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--foreground); }

        /* ── CTA SECTION ─────────────────────────────────── */
        .cta-section {
            display: flex; flex-direction: column; gap: 0.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .cta-primary {
            width: 100%; padding: 0.95rem 1rem;
            background-color: var(--accent); color: #fff;
            border: none; font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            text-decoration: none; cursor: pointer;
            transition: background-color 0.15s;
        }
        .cta-primary:hover { background-color: var(--accent-dark); }
        .cta-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .cta-secondary {
            width: 100%; padding: 0.82rem 1rem;
            background-color: transparent; color: var(--text-2);
            border: 1px solid var(--border); font-family: 'Montserrat', sans-serif;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            text-decoration: none; cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .cta-secondary:hover { border-color: rgba(0,0,0,0.22); color: var(--foreground); }

        /* ── TRUST BADGES ────────────────────────────────── */
        .badge-row {
            display: flex; flex-wrap: wrap; gap: 4px;
        }
        .badge {
            font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border: 1px solid rgba(0,0,0,0.12);
            color: var(--foreground);
        }

        /* ── BACK SECTION ────────────────────────────────── */
        .back-section {
            max-width: 1200px; margin: 0 auto;
            padding: 2rem 2rem;
            border-top: 1px solid var(--border);
        }
        .back-to-collection {
            display: inline-flex; align-items: center; gap: 0.5rem;
            font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-2); text-decoration: none;
            transition: color 0.15s;
        }
        .back-to-collection:hover { color: var(--foreground); }

        /* ── FOOTER ──────────────────────────────────────── */
        .site-footer {
            padding: 2.5rem 2rem; border-top: 1px solid var(--border);
            background-color: #ebebeb;
        }
        .footer-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: flex-start; justify-content: space-between;
            flex-wrap: wrap; gap: 2rem;
        }
        .footer-logo { height: 13px; filter: none; opacity: 0.4; display: block; margin-bottom: 0.75rem; }
        .footer-tagline { font-size: 0.72rem; color: var(--text-3); line-height: 1.6; max-width: 200px; }
        .footer-meta { display: flex; flex-direction: column; gap: 0.6rem; align-items: flex-end; }
        @media (max-width: 600px) { .footer-meta { align-items: flex-start; } }
        .footer-address { font-size: 0.72rem; color: var(--text-3); text-align: right; line-height: 1.6; font-style: normal; }
        @media (max-width: 600px) { .footer-address { text-align: left; } }
        .footer-social { display: flex; gap: 0.5rem; }
        .footer-social a {
            width: 28px; height: 28px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-3); text-decoration: none;
            transition: color 0.15s, border-color 0.15s;
        }
        .footer-social a:hover { color: var(--accent); border-color: rgba(224,112,32,0.35); }
        .footer-copy { font-size: 0.66rem; color: var(--text-3); margin-top: 2rem; text-align: center; }

        /* ── FLOATING WA ─────────────────────────────────── */
        .wa-float {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500;
            width: 50px; height: 50px; background-color: #16a34a; color: #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px -4px rgba(22,163,74,0.4);
            transition: background-color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .wa-float:hover { background-color: #15803d; transform: scale(1.08); }

        /* ── MOBILE NAV ─────────────────────────────────── */
        .hamburger {
            display: none; background: transparent; border: none;
            color: var(--foreground); cursor: pointer; padding: 0.25rem;
        }
        @media (max-width: 860px) { .hamburger { display: block; } }
        .hamburger-icon { transition: transform 0.3s ease-in-out; display: block; }
        .hamburger.is-open .hamburger-icon { transform: rotate(-45deg); }
        .menu-path-top {
            stroke-dasharray: 12 63; stroke-dashoffset: 0;
            transition: stroke-dasharray 0.3s ease-in-out, stroke-dashoffset 0.3s ease-in-out;
        }
        .hamburger.is-open .menu-path-top { stroke-dasharray: 20 300; stroke-dashoffset: -32.42px; }
        #mobile-nav {
            position: fixed; inset: 0; z-index: 1500;
            background-color: rgba(247,247,247,0.97);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s; display: flex; flex-direction: column;
        }
        #mobile-nav.open { opacity: 1; pointer-events: all; }
        .mobile-nav-inner { display: flex; flex-direction: column; padding: 5.5rem 2.5rem 3rem; height: 100%; position: relative; }
        #mobile-nav-close {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: transparent; border: 1px solid var(--border);
            color: var(--foreground); width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem; line-height: 1;
            transition: border-color 0.15s, background-color 0.15s;
        }
        #mobile-nav nav { display: flex; flex-direction: column; flex: 1; justify-content: center; gap: 0; }
        #mobile-nav nav a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.4rem, 9vw, 3.6rem);
            color: var(--text-2); text-decoration: none;
            letter-spacing: 0.03em; border-bottom: 1px solid var(--border);
            padding: 0.7rem 0; transition: color 0.15s;
        }
        #mobile-nav nav a:hover { color: var(--accent); }
        #mobile-nav nav a:first-child { border-top: 1px solid var(--border); }
        .mobile-nav-footer { font-size: 0.72rem; color: var(--text-3); margin-top: 2rem; }
        .mobile-nav-footer a { color: var(--text-3); text-decoration: none; }
        .mobile-nav-footer a:hover { color: var(--accent); }

        /* ── MOBILE FIXES ────────────────────────────────── */
        @media (max-width: 860px) {
            .zoom-btn { opacity: 1; width: 44px; height: 44px; }
            .site-header { padding: 0 1.25rem; }
        }
        @media (max-width: 600px) {
            .info-col { padding: 1.25rem 1rem; }
            #lightbox-prev { left: 0.5rem; }
            #lightbox-next { right: 0.5rem; }
        }

        /* ── NOT FOUND ───────────────────────────────────── */
        .not-found {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: calc(100dvh - 120px);
            gap: 1.5rem; padding: 2rem;
            text-align: center;
        }
        .not-found h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem; color: var(--accent);
        }
        .not-found p { font-size: 0.88rem; color: var(--text-2); }
        .not-found a {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent); color: #fff;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            text-decoration: none;
            transition: background-color 0.15s;
        }
        .not-found a:hover { background-color: var(--accent-dark); }
    </style>
</head>
<body>

<header class="site-header">
    <a href="index.html" aria-label="Blaene anasayfa">
        <img src="logo/blaene-logo.png" alt="Blaene" class="header-logo">
    </a>
    <nav class="header-center" aria-label="Ana navigasyon">
        <a href="bath.html" class="nav-link" id="nav-bath">Bath</a>
        <a href="forge.html" class="nav-link" id="nav-forge">Forge</a>
        <a href="industrial.html" class="nav-link" id="nav-industrial">Industrial</a>
        <a href="index.html#why" class="nav-link">Hakkımızda</a>
        <a href="index.html#contact" class="nav-link">İletişim</a>
    </nav>
    <div class="header-right">
        <a href="#" class="wa-header-btn" id="header-teklif" target="_blank" rel="noopener noreferrer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
            </svg>
            Teklif Al
        </a>
        <button class="hamburger" id="hamburger" aria-label="Menüyü aç" aria-expanded="false">
            <svg class="hamburger-icon" width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path class="menu-path-top" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"/>
                <path d="M7 16 27 16"/>
            </svg>
        </button>
    </div>
</header>

<div id="mobile-nav" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Mobil menü">
    <div class="mobile-nav-inner">

            currentImgIdx = 0;
            setMainImg(imgs[0]);
            buildThumbs(imgs);
            updateArrows(imgs.length);
        } else {
            // Yüzey (Bath) — CSS filter
            const img = document.getElementById('gallery-img');
            img.classList.toggle('siyah', btn.dataset.variant === 'siyah');
        }
    });
    // ── LIGHTBOX ──────────────────────────────────────────
    let lbImages = [];
    let lbIndex  = 0;

    function openLightbox(imgs, idx) {
        lbImages = imgs;
        lbIndex  = idx;
        updateLightbox();
        const lb = document.getElementById('lightbox');
        lb.classList.add('open');
        lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightbox').setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }
    function updateLightbox() {
        document.getElementById('lightbox-img').src = lbImages[lbIndex];
        document.getElementById('lightbox-counter').textContent = lbImages.length > 1 ? `${lbIndex + 1} / ${lbImages.length}` : '';
        document.getElementById('lightbox-prev').disabled = lbIndex === 0;
        document.getElementById('lightbox-next').disabled = lbIndex === lbImages.length - 1;
    }
    function getCurrentImages() {
        const activeColor = document.querySelector('.variant-btn.active[data-color]')?.dataset.color;
        return (product.colorGroups && activeColor) ? product.colorGroups[activeColor] : product.images;
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target.id === 'lightbox') closeLightbox();
    });
    document.getElementById('lightbox-prev').addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; updateLightbox(); } });
    document.getElementById('lightbox-next').addEventListener('click', () => { if (lbIndex < lbImages.length - 1) { lbIndex++; updateLightbox(); } });
    document.addEventListener('keydown', e => {
        const lb = document.getElementById('lightbox');
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft'  && lbIndex > 0)                     { lbIndex--; updateLightbox(); }
        if (e.key === 'ArrowRight' && lbIndex < lbImages.length - 1)   { lbIndex++; updateLightbox(); }
    });

    // Open lightbox on main image or zoom button click
    document.getElementById('gallery-main-area').addEventListener('click', e => {
        if (e.target.closest('.zoom-btn') || e.target.id === 'gallery-img') {
            const imgs = getCurrentImages();
            const currentSrc = document.getElementById('gallery-img').src;
            const idx = imgs.findIndex(s => currentSrc.includes(s.split('/').pop()));
            openLightbox(imgs, Math.max(0, idx));
        }
    });
}
// ── MOBILE NAV ────────────────────────────────────────
(function() {
    const hamburger   = document.getElementById('hamburger');
    const mobileNav   = document.getElementById('mobile-nav');
    const mobileClose = document.getElementById('mobile-nav-close');
    if (!hamburger) return;
    function openNav()  { mobileNav.classList.add('open'); mobileNav.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; hamburger.setAttribute('aria-expanded','true'); hamburger.classList.add('is-open'); }
    function closeNav() { mobileNav.classList.remove('open'); mobileNav.setAttribute('aria-hidden','true'); document.body.style.overflow=''; hamburger.setAttribute('aria-expanded','false'); hamburger.classList.remove('is-open'); }
    hamburger.addEventListener('click', openNav);
    mobileClose.addEventListener('click', closeNav);
    mobileNav.addEventListener('click', e => { if (e.target === mobileNav) closeNav(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
})();
</script>
